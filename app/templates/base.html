<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFinRAG — 金融合规问答</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/marked@15.0.7/marked.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <a href="/" class="logo">📈 StockFinRAG</a>
            </div>
            <nav class="header-nav">
                <a href="#chat" class="nav-link active" onclick="switchTab('chat')">💬 问答</a>
                <a href="#knowledge" class="nav-link" onclick="switchTab('knowledge')">📚 知识库</a>
            </nav>
            <div class="header-right" id="stock-ticker">
                <span class="ticker-loading">加载中...</span>
            </div>
        </header>
        <main class="app-main" id="app-main">
            <!-- Chat tab -->
            <div id="tab-chat" class="tab-content" style="display:flex;flex:1">
                {% include "_chat_content.html" %}
            </div>
            <!-- Knowledge tab -->
            <div id="tab-knowledge" class="tab-content" style="display:none;flex:1">
                {% include "_knowledge_content.html" %}
            </div>
        </main>
    </div>
    <script>
        // 行情小部件
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/indices')
                .then(r => r.json())
                .then(data => {
                    if (data && data.indices && data.indices.length > 0) {
                        const html = data.indices.map(i =>
                            `<span class="ticker-item">${i.name} <strong>${i.close.toFixed(2)}</strong></span>`
                        ).join('');
                        document.getElementById('stock-ticker').innerHTML = html;
                    }
                })
                .catch(() => {});
            // 恢复上次的标签页
            const tab = location.hash.replace('#', '') || 'chat';
            switchTab(tab);
        });

        function switchTab(name) {
            // 隐藏所有 tab
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            // 显示选中的 tab
            const target = document.getElementById('tab-' + name);
            if (target) target.style.display = 'flex';
            // 更新导航高亮
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-link[href="#${name}"]`)?.classList.add('active');
            // 更新 URL hash（不触发滚动）
            history.replaceState(null, '', '#' + name);
            // 如果切换到知识库，触发加载数据
            if (name === 'knowledge' && window.loadDocs) {
                window.loadDocs();
            }
        }
    </script>
</body>
</html>
